name: bravoseis-methods
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.12
  - numpy>=2.0
  - pandas>=2.2
  - scipy>=1.14
  - matplotlib>=3.9
  - pyarrow>=17.0
  - jupyter
  - ipykernel
  - pip
  - pip:
    # These are only needed if running detection from raw DAT files.
    # The notebook can also load pre-computed outputs (parquet files)
    # without these dependencies.
    - obspy>=1.4
    - setuptools  # required by obspy for pkg_resources
